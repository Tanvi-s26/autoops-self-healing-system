version: '3.9'

services:

  autoops-api:
    build: .
    container_name: autoops-api-container

    ports:
      - "8000:8000"

    restart: always

  prometheus:
    image: prom/prometheus

    container_name: prometheus-container

    ports:
      - "9090:9090"

    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml

    restart: always